name: Build and Release

# Kjøres automatisk ved tag-push (v*) eller manuelt fra GitHub Actions-UI.
# Bygger Windows .exe + macOS .dmg og laster dem opp til GitHub Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release-tag som finnes på GitHub (f.eks. v1.0.0)'
        required: true

permissions:
  contents: write   # Trengs for å laste opp til Release

# Bruk Node.js 24 for å unngå deprecation-advarsel fra actions/checkout og setup-uv
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Oppretter release én gang – unngår race-condition ─────────────────
  create-release:
    name: Opprett GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}

    steps:
      - name: Løs opp tag-navn
        id: resolve
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          TAG="${INPUT_TAG:-$GITHUB_REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Opprett release (hvis den ikke finnes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json tagName > /dev/null 2>&1 || \
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes "Automatisk bygg fra GitHub Actions."

  # ── macOS ─────────────────────────────────────────────────────────────
  build-macos:
    name: macOS .dmg (Apple Silicon)
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Installer avhengigheter
        run: uv sync

      - name: Bygg app-bundle (PyInstaller)
        run: bash scripts/build_mac.sh

      - name: Pakk .dmg
        run: bash scripts/package_mac.sh

      - name: Last opp til GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          gh release upload "$TAG" artifacts/macos/installer/*.dmg --clobber

  # ── Windows ───────────────────────────────────────────────────────────
  build-windows:
    name: Windows .exe (x64)
    needs: create-release
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Installer avhengigheter
        run: uv sync

      - name: Installer Inno Setup
        run: |
          $iscc = @(
            "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($iscc) {
            Write-Host "Inno Setup allerede tilgjengelig: $iscc"
          } else {
            choco install innosetup --yes --no-progress
          }

      - name: Bygg app-bundle (PyInstaller)
        run: .\scripts\build_win.ps1

      - name: Pakk installer (.exe)
        run: .\scripts\package_win.ps1

      - name: Last opp til GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $Tag = "${{ needs.create-release.outputs.tag }}"
          $Installer = Get-ChildItem artifacts\windows\installer\*.exe | Select-Object -First 1
          if (-not $Installer) { throw "Fant ingen .exe i artifacts\windows\installer\" }
          Write-Host "Laster opp: $($Installer.FullName)"
          gh release upload $Tag $Installer.FullName --clobber
